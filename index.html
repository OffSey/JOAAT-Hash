<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JOAAT Hash Converter – FiveM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e6edf3;
      overflow: hidden;
      position: relative;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }

    .glow-orb.one {
      width: 420px; height: 420px;
      background: #cba052;
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .glow-orb.two {
      width: 320px; height: 320px;
      background: #e0b96a;
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    .glow-orb.three {
      width: 200px; height: 200px;
      background: #cba052;
      bottom: 30%; left: 10%;
      animation-delay: 1.5s;
      opacity: 0.08;
    }

    @keyframes orbFloat {
      from { transform: translateY(0px) scale(1); }
      to   { transform: translateY(30px) scale(1.08); }
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.03; }
      50% { opacity: 0.07; }
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(203,160,82,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(203,160,82,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridPulse 6s ease-in-out infinite;
    }

    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(203,160,82,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
    }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(203,160,82,0.95);
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
      box-shadow: 0 0 10px rgba(203,160,82,0.8), 0 0 20px rgba(203,160,82,0.3);
    }

    .cursor-ring {
      position: fixed;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(203,160,82,0.55);
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s, border-width 0.2s;
    }


    .card {
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(203,160,82,0.08);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .header-text h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .header-text p {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 2px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      background: #0d1117;
      border: 1.5px solid #2a2a2a;
      border-radius: 8px;
      padding: 13px 16px;
      font-size: 1rem;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: #cba052;
      box-shadow: 0 0 0 3px rgba(203,160,82,0.12);
    }

    .hint {
      font-size: 0.75rem;
      color: #6e7681;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #cba052;
      margin-bottom: 16px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-row {
      background: rgba(13,17,23,0.8);
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .result-row:hover { border-color: rgba(203,160,82,0.3); }

    .result-row .result-info span { display: block; }

    .result-label {
      font-size: 0.72rem;
      color: #6e7681;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Consolas', monospace;
    }

    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
      color: #8b949e;
    }

    .copy-btn:hover {
      background: #30363d;
      border-color: #cba052;
      color: #cba052;
    }

    .copy-btn svg { width: 16px; height: 16px; }

    .models-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 13px 16px;
      color: #8b949e;
      font-size: 0.88rem;
      font-family: 'Segoe UI', sans-serif;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .models-btn:hover {
      background: rgba(203,160,82,0.08);
      border-color: #cba052;
      color: #cba052;
    }

    .models-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: #6e7681;
    }

    .footer a {
      color: #cba052;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #cba052;
      color: #0d1117;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 1.5px solid rgba(203,160,82,0.6);
      pointer-events: none;
      z-index: 99;
      transform: translate(-50%, -50%) scale(0);
      animation: rippleOut 0.6s ease-out forwards;
    }

    @keyframes rippleOut {
      to { transform: translate(-50%, -50%) scale(1); opacity: 0; width: 80px; height: 80px; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="bg-grid"></div>
  <div class="glow-orb one"></div>
  <div class="glow-orb two"></div>
  <div class="glow-orb three"></div>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="card">
    <div class="header">
      <div class="header-text">
        <h1>JOAAT Hash Converter</h1>
        <p>Convert any string to a FiveM hash</p>
      </div>
    </div>

    <label for="inputStr">Input String</label>
    <input type="text" id="inputStr" placeholder="enter_string_here" autocomplete="off" spellcheck="false" />
    <p class="hint">Lowercased before hashing, as FiveM does internally.</p>

    <div class="section-title">Hashes</div>

    <div class="results">
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Signed (Int32)</span>
          <span class="result-value" id="signed">0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('signed')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Unsigned (UInt32)</span>
          <span class="result-value" id="unsigned">0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('unsigned')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Hexadecimal</span>
          <span class="result-value" id="hex">0x0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('hex')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="models-btn" href="https://my.xionshield.eu/models" target="_blank">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search this string in models list in XionShield
    </a>

    <div class="footer">
      By <strong>OffSey</strong> for
      <img src="https://cdn.xionhosting.de/uploads/xionsecurelogo.png" alt="XionShield" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:3px;" />
      <a href="https://xionshield.eu" target="_blank">xionshield.eu</a>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
   const mouse        = { x: null, y: null };
    const cursorGlow   = document.getElementById('cursorGlow');
    const cursorDot    = document.getElementById('cursorDot');
    const cursorRing   = document.getElementById('cursorRing');

    let dotX = 0, dotY = 0;
    let ring1X = 0, ring1Y = 0;
    let ring2X = 0, ring2Y = 0;

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initParticles();
    }

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function initParticles() {
      particles = [];
      const count = Math.floor((W * H) / 9000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: randomBetween(0.4, 2.2),
          dx: randomBetween(-0.18, 0.18),
          dy: randomBetween(-0.28, -0.04),
          alpha: randomBetween(0.15, 0.75),
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: randomBetween(0.008, 0.022),
          wobbleAmp: randomBetween(0.3, 1.1),
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        p.wobble += p.wobbleSpeed;
        p.x += p.dx + Math.sin(p.wobble) * p.wobbleAmp * 0.4;
        p.y += p.dy;

        if (mouse.x !== null) {
          const mx = mouse.x - p.x;
          const my = mouse.y - p.y;
          const md = Math.sqrt(mx * mx + my * my);
          if (md < 180) {
            p.x += mx / md * 0.18 * (1 - md / 180);
            p.y += my / md * 0.18 * (1 - md / 180);
          }
        }

        if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
        if (p.x < -5) p.x = W + 5;
        if (p.x > W + 5) p.x = -5;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(203,160,82,${p.alpha})`;
        ctx.fill();
      }

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(203,160,82,${0.10 * (1 - dist / 100)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }

        if (mouse.x !== null) {
          const dist = Math.hypot(particles[i].x - mouse.x, particles[i].y - mouse.y);
          if (dist < 160) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(203,160,82,${0.22 * (1 - dist / 160)})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener('resize', resize);
    resize();
    drawParticles();

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top  = e.clientY + 'px';
    });

    function animateCursor() {
      if (mouse.x !== null) {
        dotX += (mouse.x - dotX) * 0.55;
        dotY += (mouse.y - dotY) * 0.55;
        cursorDot.style.left = dotX + 'px';
        cursorDot.style.top  = dotY + 'px';

        ring1X += (mouse.x - ring1X) * 0.18;
        ring1Y += (mouse.y - ring1Y) * 0.18;
        cursorRing.style.left = ring1X + 'px';
        cursorRing.style.top  = ring1Y + 'px';

        ring2X += (mouse.x - ring2X) * 0.09;
        ring2Y += (mouse.y - ring2Y) * 0.09;
      }
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    document.querySelectorAll('button, a, input').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursorRing.style.width        = '44px';
        cursorRing.style.height       = '44px';
        cursorRing.style.borderColor  = 'rgba(203,160,82,0.9)';
        cursorRing.style.borderWidth  = '2px';
        cursorDot.style.width         = '4px';
        cursorDot.style.height        = '4px';
      });
      el.addEventListener('mouseleave', () => {
        cursorRing.style.width        = '30px';
        cursorRing.style.height       = '30px';
        cursorRing.style.borderColor  = 'rgba(203,160,82,0.55)';
        cursorRing.style.borderWidth  = '1.5px';
        cursorDot.style.width         = '6px';
        cursorDot.style.height        = '6px';
      });
    });

    window.addEventListener('click', (e) => {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left   = e.clientX + 'px';
      r.style.top    = e.clientY + 'px';
      r.style.width  = '10px';
      r.style.height = '10px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 650);
    });

    function joaat(str) {
      str = str.toLowerCase();
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h += str.charCodeAt(i);
        h += h << 10;
        h ^= h >>> 6;
      }
      h += h << 3;
      h ^= h >>> 11;
      h += h << 15;
      return h >>> 0;
    }

    const input = document.getElementById('inputStr');
    input.addEventListener('input', () => {
      const val = input.value;
      if (!val) {
        document.getElementById('signed').textContent   = '0';
        document.getElementById('unsigned').textContent = '0';
        document.getElementById('hex').textContent      = '0x0';
        return;
      }
      const u = joaat(val);
      const s = u | 0;
      document.getElementById('signed').textContent   = s;
      document.getElementById('unsigned').textContent = u;
      document.getElementById('hex').textContent      = '0x' + u.toString(16).toUpperCase();
    });

    function copyValue(id) {
      const val = document.getElementById(id).textContent;
      navigator.clipboard.writeText(val).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
      });
    }
  </script>
</body>
</html>
