<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JOAAT Hash Converter – FiveM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e6edf3;
      overflow: hidden;
      position: relative;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }

    .glow-orb.one {
      width: 420px; height: 420px;
      background: #cba052;
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .glow-orb.two {
      width: 320px; height: 320px;
      background: #e0b96a;
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    .glow-orb.three {
      width: 200px; height: 200px;
      background: #cba052;
      bottom: 30%; left: 10%;
      animation-delay: 1.5s;
      opacity: 0.08;
    }

    @keyframes orbFloat {
      from { transform: translateY(0px) scale(1); }
      to   { transform: translateY(30px) scale(1.08); }
    }

    .card {
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(203,160,82,0.08);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-wrap {
      background: #0d1117;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .header-text h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .header-text p {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid #21262d;
    }

    .brand img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-name .xion { color: #cba052; }
    .brand-name .shield { color: #e6edf3; }

    .brand-sub {
      font-size: 0.75rem;
      color: #6e7681;
      margin-top: 1px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      background: #0d1117;
      border: 1.5px solid #2a2a2a;
      border-radius: 8px;
      padding: 13px 16px;
      font-size: 1rem;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: #cba052;
      box-shadow: 0 0 0 3px rgba(203,160,82,0.12);
    }

    .hint {
      font-size: 0.75rem;
      color: #6e7681;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #cba052;
      margin-bottom: 16px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-row {
      background: rgba(13,17,23,0.8);
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .result-row:hover { border-color: rgba(203,160,82,0.3); }

    .result-row .result-info span { display: block; }

    .result-label {
      font-size: 0.72rem;
      color: #6e7681;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e6edf3;
      font-family: 'Cascadia Code', 'Consolas', monospace;
    }

    .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
      color: #8b949e;
    }

    .copy-btn:hover {
      background: #30363d;
      border-color: #cba052;
      color: #cba052;
    }

    .copy-btn svg { width: 16px; height: 16px; }

    .models-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 13px 16px;
      color: #8b949e;
      font-size: 0.88rem;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .models-btn:hover {
      background: rgba(203,160,82,0.08);
      border-color: #cba052;
      color: #cba052;
    }

    .models-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: #6e7681;
    }

    .footer a {
      color: #cba052;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #cba052;
      color: #0d1117;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="glow-orb one"></div>
  <div class="glow-orb two"></div>
  <div class="glow-orb three"></div>

  <div class="card">

    <div class="header">
      <div class="header-text">
        <h1>JOAAT Hash Converter</h1>
        <p>Convert any string to a FiveM hash</p>
      </div>
    </div>

    <label for="inputStr">Input String</label>
    <input type="text" id="inputStr" placeholder="enter_string_here" autocomplete="off" spellcheck="false" />
    <p class="hint">Lowercased before hashing, as FiveM does internally.</p>

    <div class="section-title">
      Hashes
    </div>

    <div class="results">
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Signed (Int32)</span>
          <span class="result-value" id="signed">0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('signed')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Unsigned (UInt32)</span>
          <span class="result-value" id="unsigned">0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('unsigned')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="result-row">
        <div class="result-info">
          <span class="result-label">Hexadecimal</span>
          <span class="result-value" id="hex">0x0</span>
        </div>
        <button class="copy-btn" onclick="copyValue('hex')" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="models-btn" href="https://my.xionshield.eu/models" target="_blank">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search this string in models list in XionShield
    </a>

    <div class="footer">
      By <strong>OffSey</strong> for <img src="https://cdn.xionhosting.de/uploads/xionsecurelogo.png" alt="XionShield" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-right:3px;" /><a href="https://xionshield.eu" target="_blank">xionshield.eu</a>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function initParticles() {
      particles = [];
      const count = Math.floor((W * H) / 14000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: randomBetween(0.5, 2),
          dx: randomBetween(-0.15, 0.15),
          dy: randomBetween(-0.25, -0.05),
          alpha: randomBetween(0.2, 0.7),
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(203, 160, 82, ${p.alpha})`;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
        if (p.x < -5) p.x = W + 5;
        if (p.x > W + 5) p.x = -5;
      }

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(203,160,82,${0.1 * (1 - dist / 100)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener('resize', () => { resize(); initParticles(); });
    resize();
    initParticles();
    drawParticles();

    function joaat(str) {
      str = str.toLowerCase();
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash += str.charCodeAt(i);
        hash += hash << 10;
        hash ^= hash >>> 6;
        hash = hash >>> 0;
      }
      hash += hash << 3;
      hash ^= hash >>> 11;
      hash += hash << 15;
      hash = hash >>> 0;
      return hash;
    }

    function toSigned(u) {
      return u >>> 0 > 2147483647 ? u - 4294967296 : u;
    }

    function update() {
      const val = document.getElementById('inputStr').value;
      const u = joaat(val);
      document.getElementById('unsigned').textContent = u;
      document.getElementById('signed').textContent = toSigned(u);
      document.getElementById('hex').textContent = '0x' + u.toString(16).toUpperCase();
    }

    document.getElementById('inputStr').addEventListener('input', update);

    function copyValue(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => showToast());
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    update();
  </script>
</body>
</html>
